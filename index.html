<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Mi Salud</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mi Salud" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Pantalla de login -->
  <div id="login" class="login hidden">
    <div class="login__card">
      <div class="login__logo">+</div>
      <h1>Mi Salud</h1>
      <p>Tu historia clínica personal, privada y siempre contigo.</p>
      <button id="btn-login" class="btn btn--primary">Entrar con Google</button>
      <p id="login-error" class="login__error"></p>
    </div>
  </div>

  <!-- Aplicación -->
  <div id="shell" class="shell hidden">
    <header class="topbar">
      <h1 id="topbar-title" class="topbar__title">Inicio</h1>
      <button id="btn-logout" class="topbar__action" title="Cerrar sesión" aria-label="Cerrar sesión">Salir</button>
    </header>

    <main id="app" class="app"></main>

    <nav class="tabbar">
      <a href="#/inicio" class="tab" data-tab="inicio">
        <span class="tab__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.6 12 3l9 7.6"/><path d="M5.2 9.4V20a1 1 0 0 0 1 1h11.6a1 1 0 0 0 1-1V9.4"/><path d="M9.5 21v-6.2h5V21"/></svg></span>
        <span class="tab__label">Inicio</span></a>
      <a href="#/medicamentos" class="tab" data-tab="medicamentos">
        <span class="tab__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 3.8 3.8 10.5a4.6 4.6 0 0 0 6.5 6.5l6.7-6.7a4.6 4.6 0 0 0-6.5-6.5Z"/><path d="M7.2 7.2l6.6 6.6"/></svg></span>
        <span class="tab__label">Medicinas</span></a>
      <a href="#/citas" class="tab" data-tab="citas">
        <span class="tab__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.8" width="17" height="15.7" rx="2.6"/><path d="M3.5 9.3h17"/><path d="M8 3v3.4M16 3v3.4"/></svg></span>
        <span class="tab__label">Citas</span></a>
      <a href="#/examenes" class="tab" data-tab="examenes">
        <span class="tab__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12.2h3.6l2.2-6.4 4.1 13 2.3-6.6H21"/></svg></span>
        <span class="tab__label">Exámenes</span></a>
      <a href="#/diario" class="tab" data-tab="diario">
        <span class="tab__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3.5" width="14" height="17" rx="2.4"/><path d="M9 3.5V7h6V3.5"/><path d="M8.5 11.5h7M8.5 15h4.5"/></svg></span>
        <span class="tab__label">Diario</span></a>
    </nav>
  </div>

  <!-- Contenedor de modales -->
  <div id="modal-root"></div>

  <!-- Carga inicial -->
  <div id="splash" class="splash">
    <div class="splash__logo">+</div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
